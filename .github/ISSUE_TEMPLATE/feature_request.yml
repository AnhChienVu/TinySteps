name: Feature Request
description: Suggest an improvement for TinySteps
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. Please describe the user problem and the change you want.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem are we trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: What would you like the app to do?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, examples, constraints, or related ideas
